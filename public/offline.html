<!DOCTYPE html>
<html>
<head>
  <title>Offline — Kung Fu Madness</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #e6d2a3;
      color: #1a1108;
      font-family: "Courier New", "Lucida Console", monospace;
      text-align: center;
    }
    .panel {
      background: #fbf3dc;
      border: 4px solid #1a1108;
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
      padding: 2rem 2.5rem;
      margin: 1rem;
      max-width: 26rem;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.08em; }
    .sun { font-size: 3rem; color: #b83d3d; }
    button {
      font-family: inherit;
      font-size: 1rem;
      padding: 0.5rem 1.25rem;
      background: #b83d3d;
      color: #f4e4bc;
      border: 3px solid #1a1108;
      cursor: pointer;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="sun">拳</div>
    <h1>THE DOJO IS UNREACHABLE</h1>
    <p>Your connection has fallen. Meditate, then try again.</p>
    <button onclick="location.reload()">Return to the dojo</button>
  </div>
</body>
</html>
